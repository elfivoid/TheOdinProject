<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <svg width="300" height="300" viewBox="0 0 250 250">
    <ellipse 
    cx="150"
    cy="150"
    rx="50"
    ry="50"
    fill="none"
    stroke="oklch(0.9 0.3 164)"
    stroke-width="5"
    />
   </svg>
   <svg viewBox="0 0 250 250">
    <circle cx="100" cy="100" r="50"></circle>
   </svg>

   <style>

    circle {
         stroke-dasharray: 100, 10, 25, 10;
        stroke: oklch(0.9 0.3 164);
        stroke-linecap: square;
        stroke-width: 4px;
        fill: none;
      } 

      body {
        background-color: rgb(6, 4, 15);
      }
   </style>
</body>
</html>
