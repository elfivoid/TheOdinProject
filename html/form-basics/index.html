<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Webpage</title>
</head>
<style>
   *, *::before, *::after {
      box-sizing: border-box;
   }
   body {
      line-height: 1.5;
   }
   p {
      overflow-wrap: break-word;
   }
   

</style>
<body>
    <!-- SHIFT ALT A for comment-->
   <form action="example.com/path" method="post">
      <label for="first-name">First Name:</label>
      <input type="text" id="first-name" placeholder="Lynn" name="first-name">
      <label for="user-email">Email Address:</label>
      <input type="email" id="user-email" name="email" placeholder="you@example.com">
      <label for="user-password">Password:</label>
      <input type="password" id="user-password" name="password">
      <label for="amount">Amount:</label>
      <input type="number" id="amount" name="amount">
      <label for="dob">Date of Birth:</label>
      <input type="date" id="dob" name="dob">
      <textarea rows="10" cols="20">Textarea</textarea>
      <select name="Car">
         <optgroup label="Cars">
            <option value="mercedes">Mercedes</option>
            <option value="tesla" selected>Tesla</option>
            <option value="volvo">Volvo</option>
         </optgroup>
         <optgroup label="Foot Wear">
            <option value="sneakers">Sneakers</option>
            <option value="boots">Boots</option>
         </optgroup>
      </select>

      <h1>Ticket Type</h1>
      <div>
         <input type="radio" id="child" name="ticket-type" value="child">
         <label for="child">Child</label>
      </div>
      <div>
         <input type="radio" id="child" name="ticket-type" value="child" checked>
         <label for="child">Child</label>
      </div>
      <div>
         <input type="radio" id="child" name="ticket-type" value="child">
         <label for="child">Child</label>
      </div>
      <h1>Pizza Toppings</h1>

<div>
  <input type="checkbox" id="sausage" name="topping" value="sausage">
  <label for="sausage">Sausage</label>
</div>

<div>
  <input type="checkbox" id="onions" name="topping" value="onions">
  <label for="onions">Onions</label>
</div>

<div>
  <input type="checkbox" id="pepperoni" name="topping" value="pepperoni">
  <label for="pepperoni">Pepperoni</label>
</div>

<div>
  <input type="checkbox" id="mushrooms" name="topping" value="mushrooms">
  <label for="mushrooms">Mushrooms</label>
</div>
<div>
  <input type="checkbox" id="newsletter" name="news_letter">
  <label for="newsletter">Send me the news letter</label>
</div>
<button type="submit">Submit</button>
<button type="reset">Reset</button>

<fieldset>
   <legend>Contact Details</legend>
   <label for="first-name">First Name</label>
   <input type="text" id="last-name" name="last-name">
</fieldset>
<fieldset>
   <legend>What would you like to drink?</legend>

   <div>
      <input type="radio" name="drink" id="coffee" value="coffee">
      <label for="coffee">Coffee</label>
   </div>
   <div>
      <input type="radio" name="drink" id="tea" value="tea">
      <label for="tea">Tea</label>
   </div>
   <div>
      <input type="radio" name="drink" id="soda" value="soda">
      <label for="soda">Soda</label>
   </div>

   <label for="myFruit">What's your favorite fruit?</label>
   <input type="text" name="myFruit" id="myFruit" list="mySuggestion">
   <datalist id="mySuggestion">
      <option>Apple</option>
      <option>Banana</option>
      <option>Cherry</option>
      <option>Blueberry</option>
      <option>Mango</option>
      <option>Strawberry</option>
   </datalist>
</fieldset>
   <input type="hidden" id="timestamp" name="timestamp" value="1286231"/>

   <label for="price">Choose a maximum house price:</label>
   <input
   type="range"
   name="price"
   id="price"
   min="50000"
   max="500000"
   step="1000"
   value="250000">
   <output class="price-output" for="price"></output>
   <input type="color" name="color" id="color">
   <!-- Meter Bar and Progress Bar -->
   <meter min="0" max="100" value="75" low="33" high="66" optimum="0">75</meter>
   <progress max="100" value="75">75/100</progress>
   </form>
<script defer>
   const price = document.querySelector("#price");
   const output = document.querySelector(".price-output");

   output.textContent = price.value;

   price.addEventListener("input", () => {
      output.textContent = price.value;
   });
</script>
</body>
</html>
