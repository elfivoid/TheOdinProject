<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>TOP Lesson</title>
  <style>
    input {
      font-size: 2em;
      margin: 10px 1px 0;
    }
  </style>
  </head>
<body>

  <script>
let add7 = (x) => x + 7;
let multiply = (x, y) => x * y;
let capitalize = (str) => str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
let lastLetter = (str) => str.charAt(str.length - 1);

console.log(add7(10));
console.log(multiply(3, 2));
console.log(capitalize("abcd"));
console.log(capitalize("ABCD"));
console.log(capitalize("aBcD"));
console.log(lastLetter("abcd"));


  </script>
</body>
</html>
