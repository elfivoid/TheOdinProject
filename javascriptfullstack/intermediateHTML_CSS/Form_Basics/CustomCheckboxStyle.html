<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Form Basics</title>
    <link rel="stylesheet" href="./CustomCheckboxStyle.css">
</head>
<body>

  <label class="form-control">
    <input type="checkbox" name="checkbox"/>
    checkbox
  </label>
  <label class="form-control">
    <input type="checkbox" name="checkbox-checked" checked/>
    Checkbox - checked
  </label>
    <label class="form-control">
    <input type="checkbox" name="checkbox-checked" disabled checked/>
    Checkbox - disabled and checked
  </label>
      <label class="form-control">
    <input type="checkbox" name="checkbox-checked" disabled/>
    Checkbox - disabled 
  </label>
</body>
</html>
